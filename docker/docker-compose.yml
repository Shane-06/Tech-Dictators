version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/delivery-db
    depends_on:
      - mongodb

  ml-service:
    build:
      context: ../ml-service
      dockerfile: ../docker/Dockerfile.ml
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
      - ml-service

volumes:
  mongo_data: